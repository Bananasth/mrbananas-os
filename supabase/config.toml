# Local-only Supabase configuration for `supabase start` (Docker).
#
# This is NOT linked to any hosted Supabase project or account. It contains no secrets.
# Real local keys are generated by `supabase start` and belong only in `.env.local`
# (which is gitignored). The migration pipeline that uses this is introduced in W4.

project_id = "mr-bananas-os-local"

[api]
enabled = true
port = 54321
# `app` is our private schema (helpers, audit, RLS functions) — created in W4.
schemas = ["public", "app"]
extra_search_path = ["public", "app"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Short access-token lifetime (15 min) — supports the S1 revocation model.
jwt_expiry = 900
enable_refresh_token_rotation = true
enable_signup = true

[auth.mfa]
# MFA is required for Owner and Manager (enforced in app/policy, not here).
max_enrolled_factors = 10
